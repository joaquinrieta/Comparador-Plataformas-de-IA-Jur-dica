<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comparador IA Jurídica · Joaquín Rieta</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh}
:root{--n1:#042C53;--n2:#0C447C;--n3:#E6F1FB;--n4:#85B7EB;--g1:#854F0B;--g2:#FAEEDA;--g3:#EF9F27;--g4:#BA7517}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{width:380px;border-radius:16px;overflow:hidden;border:2px solid var(--n2);box-shadow:0 8px 32px rgba(4,44,83,.2)}
.login-header{background:var(--n1);padding:2rem;text-align:center}
.login-logo{display:flex;justify-content:center;margin-bottom:12px}
.login-title{font-size:18px;font-weight:600;color:var(--n3);margin-bottom:4px}
.login-sub{font-size:11px;color:var(--n4)}
.login-divider{margin-top:14px;height:2px;background:linear-gradient(90deg,transparent,var(--g4),transparent)}
.login-body{background:#fff;padding:1.75rem 2rem 2rem}
.login-heading{font-size:13px;font-weight:500;color:#1a1a2e;margin-bottom:16px;text-align:center}
.field-label{font-size:11px;color:#667;margin-bottom:4px}
.login-input{width:100%;padding:9px 12px;font-size:13px;border:1px solid #cdd5e0;border-radius:8px;margin-bottom:12px;outline:none;font-family:inherit}
.login-input:focus{border-color:var(--n2);box-shadow:0 0 0 2px rgba(12,68,124,.15)}
.login-btn{width:100%;padding:10px;font-size:13px;font-weight:600;background:var(--n2);color:#fff;border:none;border-radius:8px;cursor:pointer;letter-spacing:.3px;font-family:inherit}
.login-btn:hover{background:#0a3a6e}
.login-error{font-size:12px;color:#a32d2d;text-align:center;margin-bottom:12px}
.hint-btn{font-size:11px;color:#889;background:none;border:none;text-decoration:underline;cursor:pointer;width:100%;text-align:center;margin-top:10px;font-family:inherit}
.hint-box{margin-top:8px;padding:8px 12px;background:#f4f6fb;border-radius:8px;font-size:11px;color:#445;text-align:center;display:none}

/* APP */
#app{display:none;max-width:1200px;margin:0 auto;padding:16px}
.app-shell{background:var(--n1);border-radius:16px;padding:1rem;box-shadow:0 8px 32px rgba(4,44,83,.2)}
.app-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid rgba(133,183,235,.25);margin-bottom:1rem;flex-wrap:wrap;gap:10px}
.app-logo{display:flex;align-items:center;gap:12px}
.app-title{font-weight:600;font-size:15px;color:var(--n3)}
.app-sub{font-size:10px;color:var(--n4)}
.app-header-right{display:flex;align-items:center;gap:14px}
.author-name{font-size:12px;font-weight:600;color:var(--g3)}
.author-web{font-size:10px;color:var(--n4);text-decoration:none}
.author-web:hover{text-decoration:underline}
.header-divider{width:1px;height:28px;background:rgba(133,183,235,.3)}
.header-btn{font-size:11px;padding:5px 10px;color:var(--n4);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:8px;cursor:pointer;font-family:inherit}
.header-btn:hover{background:rgba(255,255,255,.15)}
.analyze-btn{font-size:11px;padding:5px 12px;background:var(--g2);color:var(--g1);border:1px solid var(--g4);border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit;display:none}
.analyze-btn:hover{background:#f0d8b0}

/* TABS */
.tabs{display:flex;border-bottom:1px solid rgba(133,183,235,.25);margin-bottom:1rem;align-items:center}
.tab-btn{padding:8px 16px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-1px;color:rgba(255,255,255,.75);cursor:pointer;font-size:12px;font-family:inherit;transition:color .15s}
.tab-btn:hover{color:rgba(255,255,255,.95)}
.tab-btn.active{color:var(--g3);font-weight:600;border-bottom:3px solid var(--g3)}
.cmp-indicator{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--g3);padding-right:4px}
.cmp-dot{width:6px;height:6px;border-radius:50%;background:var(--g3)}
.clear-cmp{font-size:10px;color:rgba(255,255,255,.5);background:none;border:none;text-decoration:underline;cursor:pointer;font-family:inherit}

/* CONTENT */
.content{background:#fff;border-radius:12px;padding:1.25rem}

/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.filters select{font-size:12px;padding:5px 10px;border:1px solid #cdd5e0;border-radius:6px;background:#fff;color:#333;cursor:pointer;outline:none;font-family:inherit}
.filters select:focus{border-color:var(--n2)}
.filter-count{font-size:11px;color:#667}
.clear-filters{font-size:11px;padding:4px 8px;background:transparent;border:1px solid #dde3ee;border-radius:6px;cursor:pointer;color:#667;font-family:inherit}
.cmp-banner{display:none;margin-bottom:1rem;padding:9px 14px;background:var(--g2);border:1px solid var(--g4);border-radius:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.cmp-banner-text{font-size:12px;color:var(--g1);font-weight:600}
.cmp-go-btn{font-size:12px;padding:5px 14px;background:var(--n2);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit}

/* GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.span-full{grid-column:1/-1;text-align:center;padding:2.5rem;color:#667;font-size:13px}

/* CARD */
.card{background:#fff;border:1px solid #dde3ee;border-radius:12px;display:flex;flex-direction:column;transition:border-color .15s;cursor:default}
.card.expanded{border-color:var(--n2);border-left:4px solid var(--n2)}
.card.in-compare{border:2px solid var(--g4);border-left:4px solid var(--g4)}
.card-body{padding:1.1rem;display:flex;flex-direction:column;gap:9px;flex:1}
.card-header{display:flex;gap:10px;align-items:flex-start}
.card-initials{width:40px;height:40px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.card-name{font-weight:700;font-size:13px;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-product{font-size:10px;color:#667;margin-top:1px}
.latam-badge{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;background:#EAF3DE;color:#27500A;flex-shrink:0;align-self:flex-start}
.price-row{display:flex;align-items:center;justify-content:space-between;background:#f4f6fb;border-radius:8px;padding:5px 9px}
.price-main{font-weight:700;font-size:11px;color:#1a1a2e}
.price-trial{font-size:9px;color:#889}
.highlight-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;align-self:flex-start;white-space:nowrap}
.card-tagline{font-size:11px;color:#445;line-height:1.5}
.mini-features{display:flex;flex-direction:column;gap:4px}
.mini-feat-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.mini-feat-label{font-size:10px;color:#667;white-space:nowrap}
.dots{display:flex;gap:3px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.on{background:#1a4a8a}
.dot.off{background:#cdd5e0;opacity:.4}
.card-footer{padding:7px 10px;border-top:1px solid #eaeff7;display:flex;gap:6px}
.detail-btn{flex:1;font-size:11px;padding:5px 0;background:transparent;color:#445;border:1px solid #dde3ee;border-radius:6px;cursor:pointer;font-family:inherit}
.detail-btn.active{background:var(--n1);color:#fff;border-color:var(--n2);font-weight:600}
.compare-btn{font-size:11px;padding:5px 10px;background:transparent;color:#445;border:1px solid #dde3ee;border-radius:6px;cursor:pointer;font-family:inherit}
.compare-btn.active{background:var(--g2);color:var(--g1);border-color:var(--g4);font-weight:600}
.compare-btn:disabled{opacity:.35;cursor:not-allowed}

/* DETAIL */
.detail-panel{background:#fff;border:1px solid var(--n2);border-left:4px solid var(--n2);border-radius:12px;padding:1.5rem;margin:4px 0;grid-column:1/-1}
.detail-header{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}
.detail-initials{width:48px;height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.detail-name{font-weight:700;font-size:17px;color:#1a1a2e;margin-bottom:2px}
.detail-product{font-size:12px;color:#667}
.detail-price-block{text-align:right;flex-shrink:0;margin-left:auto}
.detail-price-main{font-weight:700;font-size:14px;color:#1a1a2e}
.detail-price-note{font-size:10px;color:#889;max-width:240px;margin-top:3px;line-height:1.4}
.detail-source{font-size:10px;color:var(--n2);margin-top:3px;display:block}
.detail-close{font-size:11px;padding:4px 10px;background:transparent;border:1px solid #dde3ee;border-radius:6px;cursor:pointer;color:#667;font-family:inherit;flex-shrink:0}
.detail-divider{height:1px;background:#eaeff7;margin-bottom:16px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.section-label{font-size:10px;font-weight:700;margin-bottom:10px;letter-spacing:.8px}
.feat-row{display:flex;gap:7px;margin-bottom:7px}
.feat-icon{font-size:11px;flex-shrink:0;font-weight:700;margin-top:1px;width:12px}
.feat-icon.plus{color:#27500A}
.feat-icon.minus{color:#a32d2d}
.feat-text{font-size:11px;color:#2a2a3e;line-height:1.5}
.tech-box{background:#f4f6fb;border-radius:8px;padding:12px 14px}
.tech-item{margin-bottom:8px}
.tech-label{font-size:10px;color:#889;display:block;margin-bottom:2px}
.tech-value{font-size:11px;color:#1a1a2e;line-height:1.4}
.product-item{display:flex;gap:7px;margin-bottom:6px}
.product-arrow{color:#889;font-size:11px;flex-shrink:0}
.product-text{font-size:11px;color:#1a1a2e;line-height:1.4}
.caps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
.cap-cell{background:#f4f6fb;border-radius:8px;padding:7px 9px}
.cap-label{font-size:10px;color:#556;margin-bottom:5px}

/* PRICE LEGEND */
.price-legend{margin-top:1.25rem;display:flex;gap:16px;flex-wrap:wrap;font-size:10px;color:#889;align-items:center}
.legend-confirmed{color:#27500A;font-weight:700}
.legend-est{color:#633806;font-weight:700}
.legend-author{margin-left:auto}

/* CHARTS TAB */
.chart-selector{background:#f0f4fb;border-radius:12px;padding:1rem 1.25rem;margin-bottom:20px}
.chart-selector-label{font-size:11px;font-weight:700;color:#556;margin-bottom:10px;letter-spacing:.7px}
.chart-selector-btns{display:flex;flex-wrap:wrap;gap:8px}
.cs-btn{font-size:11px;padding:5px 12px;background:#fff;color:#556;border:1px solid #cdd5e0;border-radius:8px;cursor:pointer;font-family:inherit}
.cs-btn.active{font-weight:700}
.chart-card{background:#fff;border:1px solid #dde3ee;border-radius:12px;padding:1.25rem;margin-bottom:20px}
.chart-card-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:3px}
.chart-card-sub{font-size:11px;color:#889;margin-bottom:14px}
.chart-accent-left{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.accent-bar{width:3px;height:18px;border-radius:2px}
.radar-info{background:#fff;border:1px solid var(--n2);border-left:4px solid var(--n2);border-radius:12px;padding:1.25rem;margin-bottom:20px}
.radar-info-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:10px}
.radar-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:11px;color:#445;line-height:1.6}
.radar-info-item{display:flex;gap:8px}
.radar-num{color:var(--n2);font-weight:700;flex-shrink:0}
.cap-table{width:100%;border-collapse:collapse;min-width:300px}
.cap-table th{padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.6px;color:#889}
.cap-table th.name-col{text-align:left;width:130px}
.cap-table th.data-col{text-align:center}
.cap-table td{padding:9px 10px;font-size:11px;border-bottom:.5px solid #eaeff7}
.cap-table td.name-cell{color:#445}
.cap-table tr:nth-child(even){background:#f4f6fb}
.bar-legend{display:flex;gap:16px;margin-top:8px}
.bar-legend-item{display:flex;gap:5px;align-items:center;font-size:10px;color:#889}
.bar-legend-dot{width:12px;height:12px;border-radius:2px}
.chart-canvas-wrap{position:relative;width:100%;height:300px}

/* SOURCES TAB */
.sources-section{background:#fff;border:1px solid #dde3ee;border-radius:12px;padding:1.5rem;margin-bottom:20px}
.sources-section.blue-accent{border-color:var(--n2);border-left:4px solid var(--n2)}
.sources-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:12px}
.sources-text{font-size:12px;color:#445;line-height:1.7;margin-bottom:12px}
.method-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:11px;color:#556}
.method-item{display:flex;gap:8px}
.method-key{font-weight:700;color:#1a1a2e;min-width:80px}
.source-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-top:.5px solid #eaeff7}
.source-initials{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.source-name{font-weight:700;font-size:12px;color:#1a1a2e;margin-bottom:2px}
.source-url{font-size:11px;color:var(--n2);text-decoration:none}
.source-url:hover{text-decoration:underline}
.source-meta{font-size:10px;color:#889;margin-top:2px}
.legal-header{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
.legal-icon{width:36px;height:36px;border-radius:8px;background:var(--n1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;font-weight:700;color:var(--g3)}
.legal-icon-title{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.legal-icon-sub{font-size:10px;color:#889}
.legal-point{font-size:11px;color:#445;line-height:1.7;margin-bottom:10px}
.legal-strong{color:#1a1a2e;font-weight:700}
.author-card{background:#fff;border:1px solid #dde3ee;border-radius:12px;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.author-avatar{width:42px;height:42px;border-radius:50%;background:var(--n1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700;color:var(--g3)}
.author-info{display:flex;gap:12px;align-items:center}
.author-full-name{font-weight:700;font-size:13px;color:#1a1a2e}
.author-role{font-size:11px;color:#667}
.author-links{text-align:right}
.author-site{font-size:12px;color:var(--n2);text-decoration:none;font-weight:700;display:block}
.author-date{font-size:10px;color:#889;margin-top:2px}
/* HELP TAB */
.help-hero{background:var(--n1);border-radius:12px;padding:1.5rem;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.help-hero-text{color:var(--n3)}
.help-hero-title{font-size:16px;font-weight:700;margin-bottom:4px}
.help-hero-sub{font-size:12px;color:var(--n4);line-height:1.6}
.help-steps{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:20px}
.help-step{background:#fff;border:1px solid #dde3ee;border-radius:12px;padding:1.1rem}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--n1);color:var(--g3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.step-title{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:5px}
.step-body{font-size:11px;color:#445;line-height:1.6}
.step-tip{display:inline-block;margin-top:6px;font-size:10px;background:var(--g2);color:var(--g1);border:1px solid var(--g4);border-radius:6px;padding:2px 7px;font-weight:600}
.help-section{background:#fff;border:1px solid #dde3ee;border-radius:12px;padding:1.25rem;margin-bottom:14px}
.help-section.accent{border-color:var(--n2);border-left:4px solid var(--n2)}
.help-section-title{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.help-section-icon{width:22px;height:22px;border-radius:6px;background:var(--n1);color:var(--g3);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.help-qa{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #eaeff7}
.help-qa:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.help-q{font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:4px;display:flex;gap:7px}
.help-q-icon{color:var(--n2);flex-shrink:0}
.help-a{font-size:11px;color:#445;line-height:1.6;padding-left:17px}
.help-shortcut-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.shortcut-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#445}
.shortcut-key{background:#f4f6fb;border:1px solid #dde3ee;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;color:#1a1a2e;white-space:nowrap}
.help-legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.legend-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#f4f6fb;border-radius:8px}
.legend-badge{font-size:10px;font-weight:700;white-space:nowrap;padding:2px 7px;border-radius:6px;flex-shrink:0}
.legend-desc{font-size:11px;color:#445;line-height:1.5}{.two-col{grid-template-columns:1fr}.radar-info-grid{grid-template-columns:1fr}.method-grid{grid-template-columns:1fr}.caps-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <svg width="44" height="44" viewBox="0 0 28 28" fill="none">
          <rect x="13" y="1" width="2" height="25" rx="1" fill="#EF9F27"/>
          <rect x="0" y="9" width="28" height="2" rx="1" fill="#EF9F27"/>
          <rect x="7" y="26" width="14" height="2" rx="1" fill="#EF9F27"/>
          <path d="M 7 11 L 3 20 L 11 20 Z" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M 21 11 L 17 20 L 25 20 Z" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="login-title">Comparador IA Jurídica</div>
      <div class="login-sub">España · LATAM · Datos verificados marzo 2026</div>
      <div class="login-divider"></div>
    </div>
    <div class="login-body">
      <div class="login-heading">Acceso profesional</div>
      <div class="field-label">Usuario</div>
      <input class="login-input" id="login-user" placeholder="Usuario" autocomplete="off" value="legal">
      <div class="field-label">Contraseña</div>
      <input class="login-input" id="login-pass" placeholder="Contraseña" value="2026">
      <div class="login-error" id="login-err" style="display:none"></div>
      <button class="login-btn" onclick="doLogin()">Acceder</button>
      <div style="margin-top:18px;padding-top:14px;border-top:1px solid #eaeff7;text-align:center">
        <div style="font-size:10px;color:#aaa;margin-bottom:4px;letter-spacing:.4px;text-transform:uppercase">Elaborado por</div>
        <div style="font-size:12px;font-weight:600;color:#1a1a2e;margin-bottom:3px">Joaquín Rieta Carbonell</div>
        <a href="https://joaquinrieta.com" target="_blank" style="font-size:11px;color:#0C447C;text-decoration:none">joaquinrieta.com</a>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-shell">
    <div class="app-header">
      <div class="app-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="13" y="1" width="2" height="25" rx="1" fill="#EF9F27"/>
          <rect x="0" y="9" width="28" height="2" rx="1" fill="#EF9F27"/>
          <rect x="7" y="26" width="14" height="2" rx="1" fill="#EF9F27"/>
          <path d="M 7 11 L 3 20 L 11 20 Z" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M 21 11 L 17 20 L 25 20 Z" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-linejoin="round"/>

function dots(value,size=7){
  let h="";
  for(let i=0;i<5;i++){
    const on=i<value;
    h+=`<div class="dot ${on?"on":"off"}" style="width:${size}px;height:${size}px"></div>`;
  }
  return `<div class="dots">${h}</div>`;
}

function getFiltered(){
  return PLATFORMS.filter(p=>{
    const {profile,budget,need}=state;
    if(profile!=="all"&&!p.profiles.includes(profile))return false;
    if(budget==="100"&&p.priceMin>100)return false;
    if(budget==="100-200"&&(p.priceMin>200||p.priceMax<100))return false;
    if(budget==="200+"&&p.priceMax<200)return false;
    if(need!=="all"&&p.features[need]<3)return false;
    return true;
  });
}

// ── FILTER HANDLERS ───────────────────────────────────────────────
function onProfileChange(v){state.profile=v;state.expandedId=null;renderComparador();}
function onBudgetChange(v){state.budget=v;state.expandedId=null;renderComparador();}
function onNeedChange(v){state.need=v;state.expandedId=null;renderComparador();}
function clearFilters(){state.profile="all";state.budget="all";state.need="all";renderComparador();}

function toggleExpand(id){
  state.expandedId=state.expandedId===id?null:id;
  renderComparador();
}

function toggleCompare(id){
  const idx=state.compareList.indexOf(id);
  if(idx>=0)state.compareList.splice(idx,1);
  else if(state.compareList.length<3)state.compareList.push(id);
  renderComparador();
  updateAnalyzeBtn();
}
function clearCompare(){state.compareList=[];renderComparador();updateAnalyzeBtn();}

function updateCmpIndicator(){
  const el=document.getElementById("cmp-indicator");
  const cnt=document.getElementById("cmp-count");
  const n=state.compareList.length;
  el.style.display=n>0?"flex":"none";
  cnt.textContent=n;
}
function updateAnalyzeBtn(){
  const btn=document.getElementById("analyze-btn");
  const n=state.compareList.length;
  btn.style.display=n>=2?"inline-block":"none";
  btn.textContent=`Ver análisis ${n} →`;
}

function renderCharts(){
  const tab=document.getElementById("tab-graficos");
  const sel=state.chartSelectedIds;

  const selectorHTML=`
    <div class="chart-selector">
      <div class="chart-selector-label">SELECCIONA HASTA 3 PLATAFORMAS</div>
      <div class="chart-selector-btns">
        ${PLATFORMS.map(p=>{
          const on=sel.includes(p.id);

          return `<button class="cs-btn${on?" active":""}" onclick="toggleChartSel('${p.id}')"
            style="background:${on?c.bg:"#fff"};color:${on?c.text:"#556"};border:${on?`1.5px solid ${c.bd}`:"1px solid #cdd5e0"};opacity:${!on&&sel.length>=3?0.35:1};font-weight:${on?700:400}">
            ${on?"✓ ":""}<span>${p.short}</span>
          </button>`;
        }).join("")}
      </div>
    </div>`;

  const plats=PLATFORMS.filter(p=>sel.includes(p.id));

  tab.innerHTML=selectorHTML+`
    <div class="radar-info">
      <div class="radar-info-title">Cómo leer el gráfico radar</div>
      <div class="radar-info-grid">
        <div class="radar-info-item"><span class="radar-num">1.</span><span>Cada eje representa una <strong>dimensión de capacidad</strong> (Investigación, Redacción, Predicción...).</span></div>

        <div class="radar-info-item"><span class="radar-num">3.</span><span>El <strong>área coloreada</strong> muestra el perfil completo de cada plataforma de un vistazo.</span></div>
        <div class="radar-info-item"><span class="radar-num">4.</span><span><strong>Especializada</strong> = picos en pocos ejes. <strong>Generalista</strong> = área total mayor.</span></div>
      </div>
    </div>
    ${plats.length>0?`
    <div class="chart-card">
      <div class="chart-accent-left"><div class="accent-bar" style="background:#0C447C"></div><div class="chart-card-title">Análisis de capacidades — radar</div></div>
      <div class="chart-card-sub">Cuanto mayor el área, mayor cobertura funcional. Los picos revelan especializaciones.</div>
      <div class="chart-canvas-wrap"><canvas id="radar-canvas"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-accent-left"><div class="accent-bar" style="background:#0C447C"></div><div class="chart-card-title">Tabla de capacidades detallada</div></div>
      <div class="chart-card-sub">Puntuación 1-5 basada en análisis propio de funcionalidades publicadas.</div>
      <div style="overflow-x:auto">${renderCapTable(plats)}</div>
    </div>`:""}
    <div class="chart-card">
      <div class="chart-accent-left"><div class="accent-bar" style="background:#BA7517"></div><div class="chart-card-title">Precios de entrada comparados</div></div>
      <div class="chart-card-sub">Precio mínimo por plataforma · azul = precio oficial ✓ · gris = estimación</div>
      <div class="chart-canvas-wrap"><canvas id="bar-canvas"></canvas></div>
      <div class="bar-legend">
        <div class="bar-legend-item"><div class="bar-legend-dot" style="background:#0C447C"></div>Precio oficial publicado ✓</div>
        <div class="bar-legend-item"><div class="bar-legend-dot" style="background:#B4B2A9"></div>Estimación de mercado</div>
      </div>
    </div>`;

  // Destroy old charts
  if(state.radarChart){state.radarChart.destroy();state.radarChart=null;}
  if(state.barChart){state.barChart.destroy();state.barChart=null;}

  setTimeout(()=>{
    if(plats.length>0){
      const rctx=document.getElementById("radar-canvas");
      if(rctx){
        state.radarChart=new Chart(rctx,{
          type:"radar",
          data:{
            labels:FM.map(f=>f.label),
            datasets:plats.map(p=>({
              label:p.short,
              data:FM.map(f=>p.features[f.key]),

              pointBackgroundColor:CC[p.id],
              pointRadius:3
            }))
          },

        });
      }
    }

      const barData=PLATFORMS.map(p=>({name:p.short,price:p.priceMin,ok:p.priceDisplay.includes("✓")})).sort((a,b)=>a.price-b.price);
      state.barChart=new Chart(bctx,{
        type:"bar",
        data:{
          labels:barData.map(d=>d.name),
          datasets:[{
            label:"Precio mínimo (€/mes)",

function renderCapTable(plats){
  const headCols=plats.map(p=>{const c=PC[p.color];return`<th class="data-col" style="background:${c.bg};color:${c.text};border-bottom:2px solid ${c.bd}">${p.short}</th>`;}).join("");
  const rows=FM.map((f,i)=>{
    const bg=i%2===0?"#f4f6fb":"#fff";
    const cells=plats.map(p=>`<td style="text-align:center;background:${bg};padding:9px 10px"><div style="display:flex;justify-content:center">${dots(p.features[f.key])}</div></td>`).join("");
    return`<tr><td class="name-cell" style="background:${bg};padding:9px 10px;font-size:11px;color:#445">${f.label}</td>${cells}</tr>`;
  }).join("");
  return`<table class="cap-table">
    <thead><tr><th class="name-col" style="color:#889;font-size:10px;font-weight:700;letter-spacing:.6px;text-align:left;padding:8px 10px">CAPACIDAD</th>${headCols}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function toggleChartSel(id){
  const idx=state.chartSelectedIds.indexOf(id);
  if(idx>=0)state.chartSelectedIds.splice(idx,1);
  else if(state.chartSelectedIds.length<3)state.chartSelectedIds.push(id);
  renderCharts();
}
